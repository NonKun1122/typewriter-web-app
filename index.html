<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Input Page */
        .input-page {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        .input-page.hidden {
            display: none;
        }

        .input-page h1 {
            font-size: 24px;
            text-align: center;
            color: #aaa;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-size: 14px;
            color: #888;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-input {
            width: 60px;
            height: 45px;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: pointer;
            background: #000;
        }

        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            border: 2px solid #555;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 2px solid #333;
            border-radius: 4px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
        }

        textarea:focus {
            outline: none;
            border-color: #666;
        }

        .hint {
            font-size: 12px;
            color: #555;
            line-height: 1.5;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-run {
            background-color: #fff;
            color: #000;
            width: 100%;
        }

        .btn-run:hover {
            background-color: #ddd;
        }

        .btn-back {
            background-color: #444;
            color: #fff;
            width: 100%;
        }

        .btn-back:hover {
            background-color: #555;
        }

        /* Waiting Page */
        .waiting-page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            min-height: 100vh;
            text-align: center;
        }

        .waiting-page.active {
            display: flex;
        }

        .waiting-text {
            font-size: 18px;
            color: #666;
            animation: pulse 1s ease-in-out infinite;
        }

        .countdown {
            font-size: 80px;
            font-weight: bold;
            color: #555;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Output Page */
        .output-page {
            display: none;
            flex-direction: column;
            gap: 20px;
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
            justify-content: space-between;
        }

        .output-page.active {
            display: flex;
        }

        .output-text {
            font-size: 18px;
            line-height: 1.8;
            word-wrap: break-word;
            white-space: pre-wrap;
            flex: 1;
            display: flex;
            align-items: flex-start;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: #fff;
            margin-left: 2px;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { background-color: transparent; }
        }

        .cursor.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Input Page -->
    <div class="input-page" id="inputPage">
        <h1>Typewriter</h1>

        <div class="form-group">
            <label>เลือกสีเริ่มต้น:</label>
            <div class="color-picker-container">
                <input type="color" id="colorPicker" class="color-input" value="#FFFFFF">
                <div id="colorPreview" class="color-preview" style="background-color: #FFFFFF;"></div>
            </div>
        </div>

        <div class="form-group">
            <label>ข้อความ:</label>
            <textarea id="textInput" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
            <div class="hint">💡 ใช้ [#FF0000]ข้อความ[/#] เพื่อเปลี่ยนสี (เช่น สีแดง)</div>
        </div>

        <button class="btn-run" id="runBtn">Run</button>
    </div>

    <!-- Waiting Page -->
    <div class="waiting-page" id="waitingPage">
        <div class="waiting-text">กำลังเตรียมการ...</div>
        <div class="countdown" id="countdown">10</div>
    </div>

    <!-- Output Page -->
    <div class="output-page" id="outputPage">
        <div class="output-text" id="outputText"></div>
        <button class="btn-back" id="backBtn">← ย้อนกลับ</button>
    </div>

    <script>
        // DOM Elements
        const inputPage = document.getElementById('inputPage');
        const waitingPage = document.getElementById('waitingPage');
        const outputPage = document.getElementById('outputPage');
        const colorPicker = document.getElementById('colorPicker');
        const colorPreview = document.getElementById('colorPreview');
        const textInput = document.getElementById('textInput');
        const runBtn = document.getElementById('runBtn');
        const backBtn = document.getElementById('backBtn');
        const outputText = document.getElementById('outputText');
        const countdownDisplay = document.getElementById('countdown');

        // State
        let countdownTimer = null;
        let typewriterTimer = null;

        // Update color preview
        colorPicker.addEventListener('change', (e) => {
            colorPreview.style.backgroundColor = e.target.value;
        });

        // Parse colored text
        function parseText(text, defaultColor) {
            const segments = [];
            const regex = /\[#([A-Fa-f0-9]{6})\](.*?)\[\/#\]/g;
            let lastIndex = 0;
            let match;

            while ((match = regex.exec(text)) !== null) {
                // Add text before tag
                if (match.index > lastIndex) {
                    segments.push({
                        text: text.substring(lastIndex, match.index),
                        color: defaultColor
                    });
                }
                // Add colored text
                segments.push({
                    text: match[2],
                    color: '#' + match[1]
                });
                lastIndex = regex.lastIndex;
            }

            // Add remaining text
            if (lastIndex < text.length) {
                segments.push({
                    text: text.substring(lastIndex),
                    color: defaultColor
                });
            }

            return segments.length > 0 ? segments : [{ text, color: defaultColor }];
        }

        // Show waiting page
        function showWaiting() {
            inputPage.classList.add('hidden');
            waitingPage.classList.add('active');
        }

        // Show output page
        function showOutput() {
            waitingPage.classList.remove('active');
            outputPage.classList.add('active');
        }

        // Show input page
        function showInput() {
            outputPage.classList.remove('active');
            inputPage.classList.remove('hidden');
        }

        // Countdown
        function startCountdown(callback) {
            let count = 10;
            countdownDisplay.textContent = count;

            countdownTimer = setInterval(() => {
                count--;
                countdownDisplay.textContent = count;

                if (count === 0) {
                    clearInterval(countdownTimer);
                    callback();
                }
            }, 1000);
        }

        // Typewriter effect
        function typewrite(segments, index = 0, charIndex = 0) {
            if (index >= segments.length) {
                // Add cursor at end
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                outputText.appendChild(cursor);
                return;
            }

            const segment = segments[index];
            let span = outputText.querySelector(`[data-index="${index}"]`);

            if (!span) {
                span = document.createElement('span');
                span.setAttribute('data-index', index);
                span.style.color = segment.color;
                outputText.appendChild(span);
            }

            if (charIndex < segment.text.length) {
                span.textContent += segment.text[charIndex];
                typewriterTimer = setTimeout(() => {
                    typewrite(segments, index, charIndex + 1);
                }, 50);
            } else {
                typewrite(segments, index + 1, 0);
            }
        }

        // Run button
        runBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return;

            const defaultColor = colorPicker.value;
            const segments = parseText(text, defaultColor);

            showWaiting();
            startCountdown(() => {
                outputText.innerHTML = '';
                showOutput();
                typewrite(segments);
            });
        });

        // Back button
        backBtn.addEventListener('click', () => {
            clearInterval(countdownTimer);
            clearTimeout(typewriterTimer);
            outputText.innerHTML = '';
            showInput();
        });

        // Keyboard shortcut
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                runBtn.click();
            }
        });
    </script>
</body>
</html>

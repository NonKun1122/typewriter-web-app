<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .typewriter-text {
            border-right: 2px solid white;
            white-space: pre-wrap;
            word-break: break-all;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        .cursor-blink {
            animation: blink 0.7s step-end infinite;
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-input {
            width: 50px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #666;
        }
        .waiting-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .countdown {
            font-size: 72px;
            font-weight: bold;
            color: #888;
        }
        .waiting-text {
            font-size: 18px;
            color: #666;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }
        .instruction-text {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Input Section -->
    <div id="input-container" class="w-full max-w-lg text-center">
        <h1 class="text-2xl mb-6 text-gray-400">กรอกข้อความที่ต้องการแสดง</h1>
        
        <!-- Color Picker -->
        <div class="mb-4">
            <label class="block text-gray-400 mb-2">เลือกสีข้อความเริ่มต้น:</label>
            <div class="color-picker-wrapper justify-center">
                <input type="color" id="color-picker" class="color-input" value="#FFFFFF">
                <div id="color-preview" class="color-preview" style="background-color: #FFFFFF;"></div>
            </div>
        </div>

        <!-- Text Input -->
        <textarea id="user-input" rows="5" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-white mb-2" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
        
        <!-- Instruction -->
        <div class="instruction-text">
            💡 ใช้ [#HEX_COLOR]ข้อความ[/#] เพื่อเปลี่ยนสีเฉพาะคำ<br>
            เช่น: สวัสดี [#FF0000]โลก[/#] ทั่วไป
        </div>
        
        <!-- Run Button -->
        <button id="run-btn" class="mt-4 px-8 py-2 bg-white text-black font-bold rounded-lg hover:bg-gray-200 transition-colors">
            Run
        </button>
    </div>

    <!-- Waiting Section (Hidden by default) -->
    <div id="waiting-container" class="hidden w-full h-full flex items-center justify-center">
        <div class="waiting-container">
            <div class="waiting-text pulse">กำลังเตรียมการ...</div>
            <div class="countdown" id="countdown">10</div>
        </div>
    </div>

    <!-- Output Section (Hidden by default) -->
    <div id="output-container" class="hidden w-full max-w-4xl h-full flex flex-col items-start justify-start p-10 overflow-auto">
        <div class="flex-1 w-full">
            <div id="output-text" class="text-3xl leading-relaxed"></div>
        </div>
        <!-- Back Button -->
        <button id="back-btn" class="mt-8 px-6 py-2 bg-gray-700 text-white font-bold rounded-lg hover:bg-gray-600 transition-colors">
            ← ย้อนกลับ
        </button>
    </div>

    <script>
        const inputContainer = document.getElementById('input-container');
        const outputContainer = document.getElementById('output-container');
        const waitingContainer = document.getElementById('waiting-container');
        const userInput = document.getElementById('user-input');
        const colorPicker = document.getElementById('color-picker');
        const colorPreview = document.getElementById('color-preview');
        const runBtn = document.getElementById('run-btn');
        const backBtn = document.getElementById('back-btn');
        const outputText = document.getElementById('output-text');
        const countdownDisplay = document.getElementById('countdown');
        let countdownTimer = null;
        let typewriterTimer = null;

        // Update color preview when color picker changes
        colorPicker.addEventListener('change', (e) => {
            colorPreview.style.backgroundColor = e.target.value;
        });

        // Parse text with color tags and return array of {text, color} objects
        function parseColoredText(text, defaultColor) {
            const result = [];
            const regex = /\[#([A-Fa-f0-9]{6})\](.*?)\[\/#\]/g;
            let lastIndex = 0;
            let match;

            while ((match = regex.exec(text)) !== null) {
                // Add text before the color tag
                if (match.index > lastIndex) {
                    result.push({
                        text: text.substring(lastIndex, match.index),
                        color: defaultColor
                    });
                }
                // Add colored text
                result.push({
                    text: match[2],
                    color: '#' + match[1]
                });
                lastIndex = regex.lastIndex;
            }

            // Add remaining text
            if (lastIndex < text.length) {
                result.push({
                    text: text.substring(lastIndex),
                    color: defaultColor
                });
            }

            return result.length > 0 ? result : [{text: text, color: defaultColor}];
        }

        // Run button - switch to waiting view and start countdown
        runBtn.addEventListener('click', () => {
            const text = userInput.value;
            const defaultColor = colorPicker.value;
            
            if (!text.trim()) return;

            // Switch to waiting view
            inputContainer.classList.add('hidden');
            waitingContainer.classList.remove('hidden');
            
            // Start countdown
            let countdown = 10;
            countdownDisplay.textContent = countdown;
            
            countdownTimer = setInterval(() => {
                countdown--;
                countdownDisplay.textContent = countdown;
                
                if (countdown === 0) {
                    clearInterval(countdownTimer);
                    
                    // Switch to output view
                    waitingContainer.classList.add('hidden');
                    outputContainer.classList.remove('hidden');
                    
                    // Clear output
                    outputText.innerHTML = '';
                    
                    // Parse colored text
                    const parsedText = parseColoredText(text, defaultColor);
                    
                    // Start typewriter effect with colors
                    typeWriterWithColors(parsedText, 0, 0);
                }
            }, 1000);
        });

        // Typewriter effect with color support
        function typeWriterWithColors(parsedText, segmentIndex, charIndex) {
            if (segmentIndex >= parsedText.length) {
                // Add cursor at the end
                const cursor = document.createElement('span');
                cursor.style.borderRight = '2px solid white';
                cursor.style.animation = 'blink 0.7s step-end infinite';
                cursor.style.paddingRight = '2px';
                outputText.appendChild(cursor);
                return;
            }

            const segment = parsedText[segmentIndex];
            
            // Create or get span for this segment
            let span = outputText.querySelector(`[data-segment="${segmentIndex}"]`);
            if (!span) {
                span = document.createElement('span');
                span.style.color = segment.color;
                span.setAttribute('data-segment', segmentIndex);
                outputText.appendChild(span);
            }

            if (charIndex < segment.text.length) {
                span.textContent += segment.text.charAt(charIndex);
                typewriterTimer = setTimeout(() => {
                    typeWriterWithColors(parsedText, segmentIndex, charIndex + 1);
                }, 50);
            } else {
                // Move to next segment
                typeWriterWithColors(parsedText, segmentIndex + 1, 0);
            }
        }

        // Back button - return to input view
        backBtn.addEventListener('click', () => {
            outputContainer.classList.add('hidden');
            inputContainer.classList.remove('hidden');
            outputText.innerHTML = '';
            
            // Clear any active timers
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
            if (typewriterTimer) {
                clearTimeout(typewriterTimer);
            }
        });

        // Allow Ctrl+Enter key to trigger Run button
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                runBtn.click();
            }
        });
    </script>
</body>
</html>

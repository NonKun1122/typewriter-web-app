<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .typewriter-text {
            border-right: 2px solid white;
            white-space: pre-wrap;
            word-break: break-all;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        .cursor-blink {
            animation: blink 0.7s step-end infinite;
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-input {
            width: 50px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #666;
        }
        .waiting-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .countdown {
            font-size: 72px;
            font-weight: bold;
            color: #888;
        }
        .waiting-text {
            font-size: 18px;
            color: #666;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Input Section -->
    <div id="input-container" class="w-full max-w-lg text-center">
        <h1 class="text-2xl mb-6 text-gray-400">กรอกข้อความที่ต้องการแสดง</h1>
        
        <!-- Color Picker -->
        <div class="mb-4">
            <label class="block text-gray-400 mb-2">เลือกสีข้อความ:</label>
            <div class="color-picker-wrapper justify-center">
                <input type="color" id="color-picker" class="color-input" value="#FFFFFF">
                <div id="color-preview" class="color-preview" style="background-color: #FFFFFF;"></div>
            </div>
        </div>

        <!-- Text Input -->
        <textarea id="user-input" rows="4" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-white mb-4" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
        
        <!-- Run Button -->
        <button id="run-btn" class="px-8 py-2 bg-white text-black font-bold rounded-lg hover:bg-gray-200 transition-colors">
            Run
        </button>
    </div>

    <!-- Waiting Section (Hidden by default) -->
    <div id="waiting-container" class="hidden w-full h-full flex items-center justify-center">
        <div class="waiting-container">
            <div class="waiting-text pulse">กำลังเตรียมการ...</div>
            <div class="countdown" id="countdown">5</div>
        </div>
    </div>

    <!-- Output Section (Hidden by default) -->
    <div id="output-container" class="hidden w-full max-w-4xl h-full flex flex-col items-start justify-start p-10 overflow-auto">
        <div class="flex-1 w-full">
            <p id="output-text" class="text-3xl typewriter-text cursor-blink leading-relaxed"></p>
        </div>
        <!-- Back Button -->
        <button id="back-btn" class="mt-8 px-6 py-2 bg-gray-700 text-white font-bold rounded-lg hover:bg-gray-600 transition-colors">
            ← ย้อนกลับ
        </button>
    </div>

    <script>
        const inputContainer = document.getElementById('input-container');
        const outputContainer = document.getElementById('output-container');
        const waitingContainer = document.getElementById('waiting-container');
        const userInput = document.getElementById('user-input');
        const colorPicker = document.getElementById('color-picker');
        const colorPreview = document.getElementById('color-preview');
        const runBtn = document.getElementById('run-btn');
        const backBtn = document.getElementById('back-btn');
        const outputText = document.getElementById('output-text');
        const countdownDisplay = document.getElementById('countdown');
        let countdownTimer = null;

        // Update color preview when color picker changes
        colorPicker.addEventListener('change', (e) => {
            colorPreview.style.backgroundColor = e.target.value;
        });

        // Run button - switch to waiting view and start countdown
        runBtn.addEventListener('click', () => {
            const text = userInput.value;
            const color = colorPicker.value;
            
            if (!text.trim()) return;

            // Switch to waiting view
            inputContainer.classList.add('hidden');
            waitingContainer.classList.remove('hidden');
            
            // Start countdown
            let countdown = 5;
            countdownDisplay.textContent = countdown;
            
            countdownTimer = setInterval(() => {
                countdown--;
                countdownDisplay.textContent = countdown;
                
                if (countdown === 0) {
                    clearInterval(countdownTimer);
                    
                    // Switch to output view
                    waitingContainer.classList.add('hidden');
                    outputContainer.classList.remove('hidden');
                    
                    // Set text color
                    outputText.style.color = color;
                    outputText.textContent = '';
                    
                    // Start typewriter effect
                    typeWriter(text, 0);
                }
            }, 1000);
        });

        // Back button - return to input view
        backBtn.addEventListener('click', () => {
            outputContainer.classList.add('hidden');
            inputContainer.classList.remove('hidden');
            outputText.textContent = '';
            
            // Clear any active countdown
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
        });

        // Typewriter effect function
        function typeWriter(text, i) {
            if (i < text.length) {
                outputText.textContent += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50); // Speed: 50ms per character
            }
        }

        // Allow Enter key to trigger Run button
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                runBtn.click();
            }
        });
    </script>
</body>
</html>
